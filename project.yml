name: GutenbergLumen

options:
  bundleIdPrefix: com.seancanaday.gutenberglumen
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    tvOS: "17.0"
    macOS: "14.0"

packages:
  GutenbergLumenKit:
    path: GutenbergLumenKit
  GutenbergArcadeUI:
    path: ../GutenbergArcadeUI

settingGroups:
  shared:
    base:
      MARKETING_VERSION: "0.1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.0"
      GENERATE_INFOPLIST_FILE: "YES"
      PRODUCT_BUNDLE_IDENTIFIER: com.seancanaday.gutenberglumen
      INFOPLIST_KEY_CFBundleDisplayName: Arcade Lumen

targets:
  GutenbergLumen-iOS:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: GutenbergLumenKit
      - package: GutenbergArcadeUI
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      groups: [shared]
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"

  GutenbergLumen-tvOS:
    type: application
    platform: tvOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: GutenbergLumenKit
      - package: GutenbergArcadeUI
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      groups: [shared]
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon-tvOS
        TARGETED_DEVICE_FAMILY: "3"
    scheme:
      testTargets: []

  GutenbergLumen-macOS:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: GutenbergLumenKit
      - package: GutenbergArcadeUI
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      groups: [shared]
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.puzzle-games"
